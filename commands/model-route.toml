# Model Route Command

Recommend the best model tier for the current task by complexity and budget.

## Usage

`/model-route [task-description] [--budget low|med|high]`

## Routing Heuristic

- `gemini-3-flash`: 
  - deterministic, low-risk mechanical changes
  - implementation and refactors
  - **Context Threshold**: Use if context > 100k tokens and task is a single-file edit or documentation.
- `gemini-3-pro`: 
  - architecture, deep review, ambiguous requirements
  - security-sensitive logic
  - debugging subtle interactions across multiple files

## Required Output

- recommended model
- confidence level
- why this model fits
- fallback model if first attempt fails

## Arguments

$ARGUMENTS:
- `[task-description]` optional free-text
- `--budget low|med|high` optional
